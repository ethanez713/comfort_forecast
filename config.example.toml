# Copy this file to `config.toml` and edit it. `config.toml` is gitignored
# because your coordinates are mildly sensitive (they pinpoint your home).

[location]
# Your home coordinates. Look them up at e.g. https://www.latlong.net
latitude = 40.7128
longitude = -74.0060
# IANA timezone (e.g. "America/New_York", "America/Los_Angeles") or "auto".
timezone = "auto"

[comfort]
max_temp_f = 78          # don't let the house get warmer than this
temp_margin_f = 2.0      # outdoor must be this many °F below max before opening windows is worth it

# Dew point is the real "muggy-ness" gauge (better than relative humidity):
#   <=55°F dry/pleasant · ~60°F getting sticky · 65°F+ oppressive
dew_point_ideal_f = 55
dew_point_max_f = 60     # above this, prefer AC (it dehumidifies) over ventilating

# Indoor relative-humidity preferences (informational; dew point drives the call).
humidity_ideal_low = 40
humidity_ideal_high = 45
humidity_ok_low = 30
humidity_ok_high = 50

aqi_max = 100            # above this US AQI, keep windows shut regardless of temperature

# Forecast graph / decision threshold:
forecast_hours = 48      # how many hours ahead to score & graph
open_score_min = 60      # open the windows when the Open-Window Score (0-100) is >= this

[sources]
# Providers to cross-check. Order doesn't matter; all are queried in parallel.
#   open_meteo — free, keyless, global; supplies AQI + the hourly forecast/score
#   nws        — free, keyless, US-only; independent *measured* observations
#   metno      — free, keyless, global; independent model (Norwegian MET)
providers = ["open_meteo", "nws", "metno"]
# Sent as the HTTP User-Agent. NWS asks for a contact; put a real email here.
user_agent = "ac-widget/0.1 (your-email@example.com)"
